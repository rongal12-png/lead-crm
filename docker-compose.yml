services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXTAUTH_URL=http://${SERVER_IP:-localhost}
    expose:
      - "3000"
    networks:
      - crm_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - crm_net

networks:
  crm_net:
